# AeroSpace Configuration
# Available commands: https://nikitabobko.github.io/AeroSpace/commands

after-login-command = []
start-at-login = true

# Notify sketchybar on workspace change
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout settings
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Keyboard
key-mapping.preset = 'qwerty'

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center', 'exec-and-forget /bin/bash -c "sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$(aerospace list-workspaces --focused)"']

# Gaps between windows and monitor edges
[gaps]
inner.horizontal = 6
inner.vertical = 6
outer.left = 6
outer.bottom = 6
outer.top = 6 #[{ monitor."^built-in retina display$" = 10 }, 38]
outer.right = 6

# Main binding mode (keybindings handled via skhd)
[mode.main.binding]
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Floating window rules
[[on-window-detected]]
if.app-id = 'com.openai.chat'
if.window-title-regex-substring = 'ChatGPT'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.FaceTime'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ScreenSharing'
run = 'layout floating'

[[on-window-detected]]
if.app-id = "com.mitchellh.ghostty"
run = 'move-node-to-workspace 3'

# Messaging apps → workspace 5
[[on-window-detected]]
if.app-id = 'org.whispersystems.signal-desktop'
run = 'move-node-to-workspace 5'

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = 'move-node-to-workspace 5'

# Spotify → workspace 6
[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 6'

# Notion Calendar → workspace 7
[[on-window-detected]]
if.app-id = 'com.cron.electron'
run = 'move-node-to-workspace 7'
