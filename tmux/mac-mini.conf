# Mac mini tmux profile. Keep the normal macOS flow, but make the host obvious.

source-file ~/.dotfiles/tmux/tmux.conf

set -g status-left '[#[fg=color141,bold]MINI #[fg=color183]#S#[fg=color255,nobold]] '
set -g status-right '#[fg=color141]#(whoami)@#H #[fg=color174]%a, #[fg=color174]%e #[fg=color174]%b #[fg=color195]%Y/%m/%d #[fg=color183]%H:%M:%S %z'
set -g window-status-current-format '#[fg=color0,bg=color141] #I:#[fg=color0]#W '
