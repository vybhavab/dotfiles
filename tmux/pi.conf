# Raspberry Pi tmux profile. Keep this close to the local flow, but visibly Pi-colored.

set-option -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*:Tc"
set -g set-clipboard on
set -s escape-time 10

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind R source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'

bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

set -g mouse on
set -g history-limit 10000
set-option -g focus-events on

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g base-index 1
set -g pane-base-index 1

setw -g automatic-rename on
set -g renumber-windows on

set-option -g visual-activity off
set-window-option -g monitor-activity on

set -g status on
set -g status-position bottom
set -g status-style bg=color0,fg=color255
set -g status-interval 1
set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left '[#[fg=color208,bold]PI #[fg=color214]#S#[fg=color255,nobold]] '
set -g status-right '#[fg=color208]#(whoami)@#H #[fg=color174]%a, #[fg=color174]%e #[fg=color174]%b #[fg=color195]%Y/%m/%d #[fg=color214]%H:%M:%S %z'
set -g window-status-format "#[bg=color235] #I:#W "
set -g window-status-current-format '#[fg=color0,bg=color208] #I:#[fg=color0]#W '

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind > swap-pane -D
bind < swap-pane -U

bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

bind C-f choose-tree -Zs

bind -n 'C-+' select-window -t 1
bind -n 'C-[' select-window -t 2
bind -n 'C-{' select-window -t 3
bind -n 'C-(' select-window -t 4
bind -n 'C-&' select-window -t 5
bind -n 'C-=' select-window -t 6
bind -n 'C-)' select-window -t 7
bind -n 'C-}' select-window -t 8
bind -n 'C-]' select-window -t 9
bind -n 'C-*' select-window -t 10

bind -n 'M-1' select-window -t 1
bind -n 'M-2' select-window -t 2
bind -n 'M-3' select-window -t 3
bind -n 'M-4' select-window -t 4
bind -n 'M-5' select-window -t 5
bind -n 'M-6' select-window -t 6
bind -n 'M-7' select-window -t 7
bind -n 'M-8' select-window -t 8
bind -n 'M-9' select-window -t 9
bind -n 'M-0' select-window -t 10
